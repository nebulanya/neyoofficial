<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* A6 Size: 100mm x 150mm */
        @page {
            size: 100mm 150mm;
            margin: 5mm;
        }
        body {
            font-family: 'Helvetica', sans-serif;
            font-size: 12px;
            margin: 0;
            padding: 0;
            color: #333;
            width: 90mm; /* A6 margin adjustment */
        }
        .container {
            width: 100%;
        }
        .header {
            text-align: left;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .brand {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            text-align: left;
        }
        .invoice-title {
            font-size: 14px;
            text-transform: uppercase;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-table div {
            padding: 3px 0;
            vertical-align: top;
        }

        .label-row {
            display: grid;
            grid-template-columns: 100px 15px 1fr; /* 90px untuk lebar label, 5px untuk titik dua, sisanya untuk konten */
            align-items: start;
            padding: 3px 0;
        }
        .label {
            font-weight: bold;
            width: 100%;
        }
        .colon {
            text-align: center;
        }
       
        .button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .printer-friendly .button .button-group {
            display: none;
        }

         @media print {
            .button-group {
                display: none;
            }
        }

        /* Pengaturan untuk perangkat mobile dengan lebar maks 732px */
/* MOBILE */
        @media screen and (max-width: 732px) {

            body {
                width: 100%;
                max-width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .container {
                width: 100%;
            }

            .brand {
                font-size: 20px;
            }

            .invoice-title {
                font-size: 15px;
            }

            .label-row {
                grid-template-columns: 85px 10px 1fr;
                font-size: 13px;
            }

            .button {
                width: 100%;
                margin-top: 20px;
            }
        }

        /* Extra kecil (Android lama / iPhone SE) */
        @media screen and (max-width: 480px) {

            .label-row {
                grid-template-columns: 1fr;
                gap: 2px;
                padding: 6px 0;
            }

            .colon {
                display: none;
            }

            .label {
                margin-bottom: 2px;
            }
        }
        .line {
            border-top: 1px dashed #333;
            margin: 10px 0;
        }
    
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">Neyo</div>
            <div class="invoice-title">Invoice</div>
        </div>
        
        <div class="info-table">
             <div class="label-row">
                <span class="label">Order ID</span><span class="colon">:</span><span id="order-id"></span>
            </div>
            <div class="label-row">
                <span class="label">Date</span><span class="colon">:</span><span id="date"></span>  
            </div>
    
            <div class="label-row">
                <span class="label">Customer Name</span><span class="colon">:</span><span id="customer-name"></span>
            </div>
            <div class="label-row">
                <span class="label">Phone</span><span class="colon">:</span><span id="phone"></span>
            </div>
            <div class="label-row">
                <span class="label">Destination</span><span class="colon">:</span><span id="destination"></span>
            </div>
        </div>
<div class="line"></div>
        
        <div class="button-group">
            <button class="button" onclick="window.print()">Invoice</button>
        </div>
    </div>

    <script>
      
       const urlParams = new URLSearchParams(window.location.search);
       const orderId = urlParams.get('orderId') || "";
       const date = urlParams.get('date') || "";
       const customerName = urlParams.get('customerName') || "";
       const phone = urlParams.get('phone') || "";
       const destination = urlParams.get('destination') || "";
       const fileName = urlParams.get('fileName') || "";

       document.getElementById('order-id').innerText = orderId;
       document.getElementById('date').innerText = date;
       document.getElementById('customer-name').innerText = customerName;
       document.getElementById('phone').innerText = phone;
       document.getElementById('destination').innerText = destination;

       if (fileName) document.title = fileName;

    </script>

</body>
</html>
