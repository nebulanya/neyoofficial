<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        /* A6 Size: 100mm x 150mm */
        @page {
            size: 100mm 150mm;
            margin: 5mm;
        }
        body {
            font-family: 'Helvetica', sans-serif;
            font-size: 12px;
            margin: 0;
            padding: 0;
            color: #333;
            width: 90mm; /* A6 margin adjustment */
        }
        .container {
            width: 100%;
        }
        .header {
            text-align: left;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .brand {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            text-align: left;
        }
        .invoice-title {
            font-size: 14px;
            text-transform: uppercase;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-table div {
            padding: 3px 0;
            vertical-align: top;
        }

        .label-row {
            display: flex;
            justify-content: flex-start;
            padding: 3px 0;
        }
        .label {
            font-weight: bold;
            width: 40%;
        }
        .total-section {
            margin-top: 15px;
            border-top: 1px dashed #333;
            padding-top: 5px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
        }
        .button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .printer-friendly .button .button-group {
            display: none;
        }
    
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">Neyo</div>
            <div class="invoice-title">Invoice</div>
        </div>
        
        <div class="info-table">
             <div class="label-row">
                <span class="label">Order ID</span><span>: <span id="orderId"></span></span>
            </div>
            <div class="label-row">
                <span class="label">Date</span><span>: <span id="date"></span></span>
            </div>
    
            <div class="label-row">
                <span class="label">Customer Name</span><span>: <span id="customerName"></span></span>
            </div>
            <div class="label-row">
                <span class="label">Phone</span><span>: <span id="phone"></span></span>
            </div>
            <div class="label-row">
                <span class="label">Destination</span><span>: <span id="destination"></span></span>
            </div>
        </div>

        <div class="total-section" id="totalCost">
        </div>
        <div class="button-group">
            <button class="button" onclick="window.print()">Invoice</button>
        </div>
    </div>

    <script>
      
       const urlParams = new URLSearchParams(window.location.search);
       const orderId = urlParams.get('order-id') || "N/A";
       const date = urlParams.get('date') || "N/A";
       const customerName = urlParams.get('customer-name') || "N/A";
       const phone = urlParams.get('phone') || "N/A";
       const destination = urlParams.get('destination') || "N/A";
       const totalCost = urlParams.get('total-cost') || "0";
       const fileName = urlParams.get('fileName') || "";

       document.getElementById('orderId').innerText = orderId;
       document.getElementById('date').innerText = date;
       document.getElementById('customerName').innerText = customerName;
       document.getElementById('phone').innerText = phone;
       document.getElementById('destination').innerText = destination;
       document.getElementById('totalCost').innerText = "Total Cost: Rp " + totalCost;

       if (fileName) document.title = fileName;

    </script>

</body>
</html>
